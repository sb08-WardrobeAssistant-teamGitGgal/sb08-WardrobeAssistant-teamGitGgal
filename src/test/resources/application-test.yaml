spring:
  flyway:
    enabled: false
  batch:
    jdbc:
      initialize-schema: always  # 테스트는 H2 인메모리 → Flyway 미사용이므로 자동 생성
  datasource:
    url: jdbc:h2:mem:clothesplz;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never # schema-pg.sql 실행 방지 추가
  cloud:
    aws:
      s3:
        bucket: dummy-bucket
      region:
        static: ap-northeast-2
      credentials:
        access-key: dummy-access
        secret-key: dummy-secret

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE


clothesplz:
  jwt:
    access-token-secret: abcdefghijklmnopqrstuvwxyz123456
    access-token-exp: 900000
    refresh-token-secret: dfghdfghfghijklmnopqrstuvwxyz123456
    refresh-token-exp: 3600000

weather:
  api:
    url: http://dummy-weather-api
    service-key: dummy-service-key

kakao:
  api:
    rest-key: dummy-kakao-key

