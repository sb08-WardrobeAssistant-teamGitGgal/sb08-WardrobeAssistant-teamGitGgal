spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100
        jdbc:
          time_zone: UTC
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  flyway:
    enabled: true
    locations:
      - classpath:db/migration # 스키마 저장 위치 - 관례

# Common Logging
logging:
  level:
    root: info

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers, caches, circuitbreakers, prometheus
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
  info:
    env:
      enabled: true

# s3
storage:
  s3:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    region: ${AWS_S3_REGION}
    bucket: ${AWS_S3_BUCKET}
    cloudfront: ${AWS_CLOUDFRONT_DOMAIN}

# 초기 계정
clothesplz:
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
    email: ${ADMIN_EMAIL}


weather:
  api:
    uri: ${WEATHER_API_URI}
    key: ${WEATHER_API_SERVICE_KEY}